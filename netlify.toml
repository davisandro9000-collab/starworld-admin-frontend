# netlify.toml (for admin frontend)
[build]
  command = "npm run build"
  publish = "dist"

# Proxy user API (adds /v1)
[[redirects]]
  from = "/api/*"
  to = "https://starworld-backend-production.up.railway.app/api/v1/:splat"
  status = 200
  force = true

# Proxy admin API (already correct)
[[redirects]]
  from = "/api/admin/*"
  to = "https://starworld-backend-production.up.railway.app/api/admin/:splat"
  status = 200
  force = true

# Proxy Socket.IO
[[redirects]]
  from = "/socket.io/*"
  to = "https://starworld-backend-production.up.railway.app/socket.io/:splat"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200